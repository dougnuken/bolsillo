<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <!-- Seguridad -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; connect-src 'self' https://api.anthropic.com; img-src 'self' data: blob:; style-src 'self'; script-src 'self'" />

  <title>Bolsillo</title>
  <meta name="description" content="Bolsillo — tus finanzas personales, claras y en calma. Local-first." />

  <!-- PWA / iOS -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#FAF9F7" />
  <meta name="color-scheme" content="light" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <!-- black-translucent: el contenido llega bajo la isla dinámica (barra
       transparente). El reloj/batería quedan en BLANCO (limitación de iOS). -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bolsillo" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />

  <!-- Fuentes self-hosted (preload de la crítica) -->
  <link rel="preload" href="./fonts/inter-latin-var.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="./fonts/spacegrotesk-latin-var.woff2" as="font" type="font/woff2" crossorigin />

  <!-- Estilos -->
  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/views.css" />
</head>
<body>
  <div class="app-shell">

    <!-- Header (respeta notch / Dynamic Island) -->
    <header class="app-header">
      <h2 class="app-header__title" id="header-title" aria-hidden="true"></h2>
      <button class="icon-btn icon-btn--notif" id="open-notif" type="button" aria-label="Notificaciones">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8.5a6 6 0 0 0-12 0c0 6-2.5 7.5-2.5 7.5h17S18 14.5 18 8.5"></path>
          <path d="M13.7 20a2 2 0 0 1-3.4 0"></path>
        </svg>
        <span class="notif-badge" id="notif-badge" hidden>0</span>
      </button>
    </header>

    <!-- Escenario de vistas (poblado por JS) -->
    <main class="view-stage" id="view-stage"></main>

    <!-- Barrido de vidrio: difumina lo que pasa por detrás de la barra flotante. -->
    <div class="nav-blur" aria-hidden="true"></div>

    <!-- Tab bar inferior + FAB (4 pestañas: Hoy · Personas · [FAB] · Movimientos · Perfil).
         Para re-mostrar/añadir una pestaña: su <button> aquí + su entrada en ROUTES (app.js). -->
    <nav class="tabbar tabbar--4" id="tabbar" aria-label="Navegación principal" role="tablist">
      <button class="tab" type="button" data-route="hoy" role="tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11.5 12 4l8 7.5"/><path d="M6 10.5V19a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-8.5"/><path d="M10 20v-5h4v5"/></svg>
        <span class="tab__label">Hoy</span>
      </button>
      <button class="tab" type="button" data-route="personas" role="tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3.5 19a5.5 5.5 0 0 1 11 0"/><path d="M16 5.2a3 3 0 0 1 0 5.6"/><path d="M17.5 13.6A5.5 5.5 0 0 1 20.5 19"/></svg>
        <span class="tab__label">Personas</span>
      </button>
      <span aria-hidden="true"></span>
      <button class="tab" type="button" data-route="movimientos" role="tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M7 8h13M7 8l3-3M7 8l3 3"/><path d="M17 16H4M17 16l-3-3M17 16l-3 3"/></svg>
        <span class="tab__label">Movimientos</span>
      </button>
      <button class="tab" type="button" data-route="perfil" role="tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="10" r="2.6"/><path d="M7.4 17.6a4.7 4.7 0 0 1 9.2 0"/></svg>
        <span class="tab__label">Perfil</span>
      </button>
    </nav>

    <!-- FAB central: abre Registrar -->
    <button class="fab" id="fab" type="button" aria-label="Registrar movimiento">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>

    <!-- Bottom sheet: Registrar -->
    <div class="scrim" id="scrim" aria-hidden="true"></div>
    <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Registrar movimiento"></div>

  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
