<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <!-- Seguridad -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; connect-src 'self' https://api.anthropic.com; img-src 'self' data: blob:; style-src 'self'; script-src 'self'" />

  <title>Bolsillo</title>
  <meta name="description" content="Bolsillo — tus finanzas personales, claras y en calma. Local-first." />

  <!-- PWA / iOS -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#0B0E14" />
  <meta name="color-scheme" content="dark" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bolsillo" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />

  <!-- Fuentes self-hosted (preload de la crítica) -->
  <link rel="preload" href="./fonts/inter-latin-var.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="./fonts/spacegrotesk-latin-var.woff2" as="font" type="font/woff2" crossorigin />

  <!-- Estilos -->
  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/views.css" />
</head>
<body>
  <div class="app-shell">

    <!-- Header (respeta notch / Dynamic Island) -->
    <header class="app-header">
      <div class="brand">
        <img class="brand__mark" src="./icons/icon-192.png" alt="" width="30" height="30" />
        <span class="brand__name">Bolsillo</span>
      </div>
      <button class="icon-btn" id="open-ajustes" type="button" aria-label="Ajustes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3.2"></circle>
          <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1.1 1.7 1.7 0 0 0-.3-1.9l-.1-.1A2 2 0 1 1 7 4.6l.1.1a1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z"></path>
        </svg>
      </button>
    </header>

    <!-- Escenario de vistas (poblado por JS) -->
    <main class="view-stage" id="view-stage"></main>

    <!-- Tab bar inferior + FAB -->
    <nav class="tabbar" id="tabbar" aria-label="Navegación principal" role="tablist">
      <button class="tab" type="button" data-route="hoy" role="tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11.5 12 4l8 7.5"/><path d="M6 10.5V19a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-8.5"/><path d="M10 20v-5h4v5"/></svg>
        <span class="tab__label">Hoy</span>
      </button>
      <button class="tab" type="button" data-route="movimientos" role="tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M7 8h13M7 8l3-3M7 8l3 3"/><path d="M17 16H4M17 16l-3-3M17 16l-3 3"/></svg>
        <span class="tab__label">Movimientos</span>
      </button>
      <span aria-hidden="true"></span>
      <button class="tab" type="button" data-route="creditos" role="tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="2"/><path d="M3 10h18"/><path d="M7 14.5h4"/></svg>
        <span class="tab__label">Créditos</span>
      </button>
      <button class="tab" type="button" data-route="asesor" role="tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4l1.6 4.4L18 10l-4.4 1.6L12 16l-1.6-4.4L6 10l4.4-1.6L12 4Z"/><path d="M18.5 15.5l.7 1.8 1.8.7-1.8.7-.7 1.8-.7-1.8-1.8-.7 1.8-.7.7-1.8Z"/></svg>
        <span class="tab__label">Asesor</span>
      </button>
    </nav>

    <!-- FAB central: abre Registrar -->
    <button class="fab" id="fab" type="button" aria-label="Registrar movimiento">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>

    <!-- Bottom sheet: Registrar -->
    <div class="scrim" id="scrim" aria-hidden="true"></div>
    <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Registrar movimiento"></div>

  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
